name: Live Pages Smoke

on:
  workflow_run:
    workflows:
      - Deploy SmartBooks Pages
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      pages_url:
        description: "Deployed SmartBooks URL to smoke test"
        required: false
        default: "https://quakfoolee-dotcom.github.io/smartbooks_accounting_app/"
  schedule:
    - cron: "30 15 * * 1"

permissions:
  contents: read

concurrency:
  group: smartbooks-pages-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke test deployed site
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SMARTBOOKS_PAGES_URL: ${{ github.event.inputs.pages_url || vars.SMARTBOOKS_PAGES_URL || 'https://quakfoolee-dotcom.github.io/smartbooks_accounting_app/' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Print smoke target
        run: echo "Smoke testing ${SMARTBOOKS_PAGES_URL}"

      - name: Run live Pages smoke test
        run: npm run test:pages-smoke

      - name: Run deployment workflow smoke test
        run: npm run test:deployment-smoke
        env:
          SMARTBOOKS_DEPLOYMENT_URL: ${{ env.SMARTBOOKS_PAGES_URL }}

      - name: Write smoke failure summary
        if: failure()
        run: node scripts/write-playwright-diagnostics.js pages-smoke

      - name: Upload smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-smoke-diagnostics
          path: |
            playwright-diagnostics/
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
