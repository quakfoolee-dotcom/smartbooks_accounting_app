name: Live Pages Smoke

on:
  workflow_run:
    workflows:
      - Deploy SmartBooks Pages
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * 1"

permissions:
  contents: read

concurrency:
  group: smartbooks-pages-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke test deployed site
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SMARTBOOKS_PAGES_URL: https://quakfoolee-dotcom.github.io/smartbooks_accounting_app/

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run live Pages smoke test
        run: npm run test:pages-smoke

      - name: Upload smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-smoke-failure-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
