name: SmartBooks CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "20"

concurrency:
  group: smartbooks-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

  documentation-checks:
    name: Documentation Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Markdown links and image assets
        run: npm run docs:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run service coverage threshold check
        run: npm run coverage:check

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  functional-tests:
    name: Functional Browser Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: ui
            command: npm run test:functional:ui
          - shard: accounting
            command: npm run test:functional:accounting
          - shard: persistence
            command: npm run test:functional:persistence
          - shard: performance
            command: npm run test:functional:performance

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run functional browser test shard
        run: ${{ matrix.command }}

      - name: Write Playwright failure summary
        if: failure()
        run: node scripts/write-playwright-diagnostics.js ${{ matrix.shard }}

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ matrix.shard }}
          path: |
            playwright-diagnostics/
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    needs:
      - syntax-check
      - documentation-checks
      - unit-tests
      - coverage
      - functional-tests
    if: always()
    timeout-minutes: 5

    steps:
      - name: Verify all CI jobs passed
        shell: bash
        run: |
          {
            echo "## SmartBooks CI Result"
            echo
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Syntax Check | ${{ needs.syntax-check.result }} |"
            echo "| Documentation Checks | ${{ needs.documentation-checks.result }} |"
            echo "| Unit Tests | ${{ needs.unit-tests.result }} |"
            echo "| Coverage Report | ${{ needs.coverage.result }} |"
            echo "| Functional Browser Test Shards | ${{ needs.functional-tests.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "syntax-check: ${{ needs.syntax-check.result }}"
          echo "documentation-checks: ${{ needs.documentation-checks.result }}"
          echo "unit-tests: ${{ needs.unit-tests.result }}"
          echo "coverage: ${{ needs.coverage.result }}"
          echo "functional-test-shards: ${{ needs.functional-tests.result }}"

          if [[ "${{ needs.syntax-check.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.documentation-checks.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.functional-tests.result }}" != "success" ]]; then
            exit 1
          fi
