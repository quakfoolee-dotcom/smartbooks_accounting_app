name: SmartBooks CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smartbooks-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run service coverage threshold check
        run: npm run coverage:check

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  functional-tests:
    name: Functional Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run functional browser tests
        run: npm run test:functional

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    needs:
      - syntax-check
      - unit-tests
      - coverage
      - functional-tests
    if: always()
    timeout-minutes: 5

    steps:
      - name: Verify all CI jobs passed
        shell: bash
        run: |
          echo "syntax-check: ${{ needs.syntax-check.result }}"
          echo "unit-tests: ${{ needs.unit-tests.result }}"
          echo "coverage: ${{ needs.coverage.result }}"
          echo "functional-tests: ${{ needs.functional-tests.result }}"

          if [[ "${{ needs.syntax-check.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.functional-tests.result }}" != "success" ]]; then
            exit 1
          fi
